<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gastro·Bon — Zentrale, Tische, Reservierungen & Schichtplan</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap');
:root{
  --steel:#EEF1F0; --paper:#FFFFFF; --ink:#18211D; --line:#D6DDDA;
  --paprika:#D9482B; --herb:#2F7A57; --amber:#B97E0B; --mut:#5C6863; --blue:#2C5F8A;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%}
body{background:var(--steel);color:var(--ink);font-family:'Barlow',system-ui,sans-serif}
#root{max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:96px}
.mono{font-family:'IBM Plex Mono',monospace}
.red{color:var(--paprika)} .green{color:var(--herb)} .amber{color:var(--amber)} .blue{color:var(--blue)}
button{font-family:inherit;color:var(--ink)}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

.hd{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 16px 10px}
.brand{font-family:'Barlow Condensed';font-weight:700;font-size:26px;letter-spacing:.06em}
.sub{font-size:12px;color:var(--mut)}
.primary{background:var(--paprika);color:#fff;border:none;border-radius:8px;
  font-family:'Barlow Condensed';font-weight:700;font-size:16px;letter-spacing:.04em;
  padding:10px 14px;cursor:pointer}
.primary.green{background:var(--herb);color:#fff}
.primary:disabled{opacity:.45;cursor:default}

.stats{display:flex;gap:6px;padding:8px 16px}
.stats>div{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 4px;text-align:center}
.stats b{display:block;font-size:17px}
.stats span{font-size:10px;color:var(--mut)}

main{padding:4px 16px}
.dayhead{font-family:'Barlow Condensed';font-weight:700;font-size:22px;margin:10px 2px 8px;display:flex;justify-content:space-between;align-items:center}

.bon{background:var(--paper);border:1px solid var(--line);border-radius:4px;margin-bottom:14px;padding:0 14px 12px;position:relative}
.bon::before{content:"";display:block;height:6px;margin:0 -14px;
  background:radial-gradient(circle at 8px -2px, transparent 6px, var(--steel) 6px);
  background-size:16px 8px}
.bon-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed var(--ink);
  padding:10px 0 8px;font-size:13px;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace}
.meta{font-size:13px;color:var(--mut);padding-top:6px}
.meta.strong{color:var(--ink);font-weight:600;padding-top:10px}

.restcard{width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:4px;
  margin-bottom:12px;padding:14px;cursor:pointer;display:block}
.restcard h3{font-family:'Barlow Condensed';font-size:20px;font-weight:700}
.restcard .ort{font-size:12px;color:var(--mut)}
.restrow{display:flex;gap:14px;padding-top:8px;font-size:12.5px;color:var(--mut)}
.restrow b{font-family:'IBM Plex Mono',monospace;color:var(--ink)}
.badge{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px}
.badge.ok{background:#EAF4EE;color:var(--herb)}
.badge.warn{background:#FBEAE5;color:var(--paprika)}

.floor{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;background:var(--paper);
  border:1px solid var(--line);border-radius:4px;padding:10px;margin-bottom:12px}
.cell{aspect-ratio:1;border:1px dashed transparent;border-radius:7px;background:none;padding:0;cursor:default}
.cell.edit{border-color:var(--line);cursor:pointer}
.cell.target{border-color:var(--herb);background:#EAF4EE;cursor:pointer}
.table{width:100%;height:100%;border-radius:9px;border:2px solid;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1;padding:1px}
.table b{font-family:'Barlow Condensed';font-size:14px;font-weight:700}
.table small{font-size:9.5px;font-family:'IBM Plex Mono',monospace}
.t-free{background:#EAF4EE;border-color:var(--herb);color:var(--herb)}
.t-busy{background:#FBEAE5;border-color:var(--paprika);color:var(--paprika)}
.t-res{background:#EAF0F6;border-color:var(--blue);color:var(--blue)}
.t-move{outline:3px solid var(--amber)}
.legend{display:flex;gap:12px;font-size:11.5px;color:var(--mut);padding:0 2px 8px;flex-wrap:wrap}

.pill{font-size:12.5px;font-weight:600;padding:3px 10px;border-radius:999px;border:1px solid;background:none;cursor:pointer}
.pill-ok{color:var(--herb);border-color:var(--herb)}
.pill-warn{color:var(--amber);border-color:var(--amber)}
.pill-off{color:var(--mut);border-color:var(--line)}
.pill.on{background:var(--ink);border-color:var(--ink);color:#fff}

.ghost{width:100%;background:none;border:1px dashed var(--mut);border-radius:8px;padding:9px;
  font-family:'Barlow Condensed';font-weight:600;font-size:15px;letter-spacing:.04em;cursor:pointer;margin-top:8px}

.row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dotted var(--line);font-size:14px}
.row:last-child{border-bottom:none}
input,select{font-family:'Barlow';font-size:14px;border:1px solid var(--line);border-radius:8px;
  padding:9px 10px;background:var(--steel);color:var(--ink);width:100%}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 0}
.formgrid .full{grid-column:1/-1}
label.lbl{font-size:11.5px;color:var(--mut);display:block;margin-bottom:3px}

.sheetwrap{position:fixed;inset:0;background:rgba(24,33,29,.45);display:flex;align-items:flex-end;z-index:20}
.sheet{background:var(--paper);width:100%;max-width:600px;margin:0 auto;border-radius:14px 14px 0 0;
  padding:6px 16px 26px;max-height:85vh;overflow-y:auto}
.close{background:none;border:none;font-size:16px;cursor:pointer}
.menugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:8px 0}
.mitem{border:1px solid var(--line);background:var(--steel);border-radius:8px;padding:8px 6px;cursor:pointer;text-align:center}
.mitem b{display:block;font-size:12.5px;font-weight:600}
.mitem span{font-size:11px;color:var(--mut);font-family:'IBM Plex Mono',monospace}
.qty{display:flex;align-items:center;gap:10px}
.qty button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--steel);font-size:16px;cursor:pointer}
.total{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:16px;
  border-top:1px dashed var(--ink);margin-top:8px;padding-top:10px;font-weight:600}
.stepper{display:flex;align-items:center;gap:12px;padding:8px 0}
.stepper b{font-family:'IBM Plex Mono',monospace;font-size:18px;min-width:28px;text-align:center}

.weekstrip{display:flex;gap:6px;padding:6px 0;overflow-x:auto}
.daychip{flex:1;min-width:40px;background:var(--steel);border:1px solid var(--line);border-radius:8px;
  padding:7px 0 5px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  font-family:'Barlow Condensed';font-weight:600;font-size:15px}
.daychip.on{border-color:var(--ink);box-shadow:inset 0 -3px 0 var(--ink)}
.dot{width:7px;height:7px;border-radius:50%}
.dot.ok{background:var(--herb)} .dot.bad{background:var(--paprika)} .dot.empty{background:var(--line)}
.crew{background:var(--steel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;
  font-size:14px;font-weight:600;cursor:pointer;margin:4px 6px 4px 0}
.crew em{font-style:normal;color:var(--mut);font-weight:400;font-size:12px}
.crew.clash{border-color:var(--paprika);color:var(--paprika)}
.iss{font-size:13px;padding:4px 0;border-bottom:1px dotted var(--line)}
.iss.hard{color:var(--paprika)} .iss.gap{color:var(--amber)} .iss.soft{color:var(--mut)}
.meter{height:8px;background:var(--steel);border-radius:99px;margin-top:10px;overflow:hidden}
.bar{display:block;height:100%;background:var(--herb)} .bar.over{background:var(--paprika)}
.subtabs{display:flex;gap:6px;padding:6px 0;flex-wrap:wrap}
.pickrow{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;
  background:var(--steel);border:1px solid var(--line);border-radius:8px;
  padding:11px 12px;margin-top:6px;font-size:14px;font-weight:600;cursor:pointer}
.pickrow.picked{border-color:var(--herb);background:#EAF4EE}
.flags{font-size:11.5px;font-weight:400;color:var(--mut);text-align:right}
.flags.red{color:var(--paprika)}
.switchrow{display:flex;gap:10px;align-items:center;font-size:14px;padding:10px 0}

/* ───── Reservierungs-Items ───── */
.resitem{border:1px solid var(--line);border-radius:8px;padding:12px;margin-top:10px;background:var(--steel)}
.resitem-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.restime{display:inline-block;background:var(--ink);color:#fff;border-radius:6px;padding:2px 8px;font-size:13px;margin-right:8px}
.resname{font-size:15px;margin-right:8px}
.resmeta{font-size:13px;color:var(--mut)}
.resitem-act{display:flex;gap:8px;margin-top:10px}
.resitem-act select{flex:1}
.waitbig{display:flex;justify-content:space-between;align-items:center;background:var(--steel);
  border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-top:10px}
.waitbig b{font-size:22px;font-family:'IBM Plex Mono',monospace}
.waitpill{flex:1;display:flex;align-items:center;font-size:13px;font-weight:600;color:var(--mut);
  background:var(--steel);border:1px solid var(--line);border-radius:8px;padding:9px 12px}
.waitpill.green{color:var(--herb);border-color:var(--herb);background:#EAF4EE}

.tabs{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;display:flex;
  background:var(--paper);border-top:1px solid var(--line);z-index:10;
  padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 12px rgba(24,33,29,.06)}
.tabs button{flex:1;background:none;border:none;padding:11px 4px 9px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-family:'Barlow Condensed';font-weight:600;font-size:14px;letter-spacing:.03em;color:var(--mut)}
.tabs button .tabico{font-size:21px;line-height:1}
.tabs button.on{color:var(--paprika)}
.tabs button.on .tabico{transform:translateY(-1px)}
@media (min-width: 700px){
  .tabs button{flex-direction:row;gap:8px;font-size:17px;padding:15px 4px}
  .tabs button .tabico{font-size:19px}
}

/* ───── Küchen-Display (KDS) ───── */
.kdsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;align-items:start}
.kds{border-width:2px;border-style:solid;border-radius:4px;background:var(--paper);padding:0 12px 12px}
.kds::before{content:"";display:block;height:6px;margin:0 -12px;
  background:radial-gradient(circle at 8px -2px, transparent 6px, var(--steel) 6px);background-size:16px 8px}
.kds .bon-head{border-bottom-style:dashed}
.kds-ok{border-color:var(--herb)}
.kds-warn{border-color:var(--amber);background:#FdF6E9}
.kds-crit{border-color:var(--paprika);background:#FBEAE5;animation:kdspulse 1.2s ease-in-out infinite}
.kds-age{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600}
.kds-ok .kds-age{color:var(--herb)} .kds-warn .kds-age{color:var(--amber)} .kds-crit .kds-age{color:var(--paprika)}
.kds-item{display:flex;justify-content:space-between;font-size:14.5px;padding:5px 0;border-bottom:1px dotted var(--line)}
.kds-item b{font-family:'IBM Plex Mono',monospace}
@keyframes kdspulse{0%,100%{box-shadow:0 0 0 0 rgba(217,72,43,.35)}50%{box-shadow:0 0 0 7px rgba(217,72,43,0)}}

/* ───── Stationäre Ansicht (großer Bildschirm): alles ohne Scrollen ───── */
@media (min-width: 1000px){
  body{overflow:hidden}
  #root{max-width:1180px;height:100vh;padding-bottom:0}
  #root>div{height:100%;display:flex;flex-direction:column}
  .content{flex:1;overflow:auto;min-height:0;padding-bottom:8px}
  .tabs{position:static;border-top:1px solid var(--line);box-shadow:none}
  .tabs button{flex-direction:row;gap:8px}
  .tischewrap{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px;align-items:start}
  .floor{width:min(100%, calc((100vh - 330px) * 0.89));margin:0 auto}
  .shiftday{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .sheetwrap{align-items:center}
  .sheet{border-radius:14px;max-width:560px}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect } = React;

/* ─────────── Persistenz: ein Speicher pro Restaurant ─────────── */
const store = {
  ok:(()=>{ try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; } catch(e){ return false; } })(),
  load(key){ try { return JSON.parse(localStorage.getItem(key)) || null; } catch(e){ return null; } },
  save(key, data){ try { localStorage.setItem(key, JSON.stringify(data)); } catch(e){} },
  // Geräte-Abmeldung: Stempel pro Restaurant. Geräte mit älterem Stempel werden abgemeldet.
  forceLogout(restId){ try { localStorage.setItem("gastrobon-logout-"+restId, String(Date.now())); } catch(e){} },
  logoutStamp(restId){ try { return +localStorage.getItem("gastrobon-logout-"+restId) || 0; } catch(e){ return 0; } }
};

/* ─────────── Konten & Restaurants ─────────── */
const DEFAULT_CHEF = { u:"chef", p:"1234", role:"chef", label:"Zentrale · alle Restaurants" };

const DEFAULT_CONFIG = {
  chef: { u:"chef", p:"1234" },
  restaurants: [
    { id:"r1", name:"Zur Linde", ort:"München", issue:null },
    { id:"r2", name:"Trattoria Sole", ort:"Augsburg", issue:"Kartenleser meldet Verbindungsfehler" },
  ],
  accounts: [
    { id:"a1", restId:"r1", u:"linde-chef", p:"1234", role:"admin", label:"Leitung" },
    { id:"a2", restId:"r1", u:"linde-kellner1", p:"1234", role:"service", label:"Kellner 1" },
    { id:"a3", restId:"r1", u:"linde-kueche", p:"1234", role:"kitchen", label:"Küche" },
  ],
};

const ROLE_LABELS = {
  admin: "Leitung (alles)",
  service: "Service / Kellner (Handy)",
  kitchen: "Küche (Bildschirm)",
};

function loadConfig(){
  const c = store.load("gastrobon-config");
  if (!c || !c.restaurants) return DEFAULT_CONFIG;
  if (!c.chef) c.chef = { u:"chef", p:"1234" };
  return c;
}

/* ─────────── Stammdaten ─────────── */
const COLS = 8, ROWS = 9;
const AVG_DINING_MIN = 75; // durchschnittliche Verweildauer pro Tischbelegung
const eur = n => n.toFixed(2).replace(".", ",") + " €";
const keyOf = (d,s) => d + "-" + s;

const MENU = [
  { id:"m1", cat:"Getränke", name:"Wasser 0,4l", price:3.2 },
  { id:"m2", cat:"Getränke", name:"Cola 0,4l", price:3.9 },
  { id:"m3", cat:"Getränke", name:"Bier 0,5l", price:4.5 },
  { id:"m4", cat:"Getränke", name:"Weißwein 0,2l", price:5.8 },
  { id:"m5", cat:"Getränke", name:"Espresso", price:2.4 },
  { id:"m6", cat:"Speisen", name:"Schnitzel", price:16.9 },
  { id:"m7", cat:"Speisen", name:"Pasta Pomodoro", price:12.5 },
  { id:"m8", cat:"Speisen", name:"Burger & Fritten", price:14.9 },
  { id:"m9", cat:"Speisen", name:"Salat groß", price:10.9 },
  { id:"m10", cat:"Speisen", name:"Tagessuppe", price:6.5 },
  { id:"m11", cat:"Dessert", name:"Tiramisu", price:6.9 },
  { id:"m12", cat:"Dessert", name:"Kugel Eis", price:2.2 },
];

const SEED_TABLES = [
  { id:"t1", label:"T1", seats:4, x:1, y:1 },
  { id:"t2", label:"T2", seats:2, x:4, y:1 },
  { id:"t3", label:"T3", seats:6, x:6, y:2 },
  { id:"t4", label:"T4", seats:4, x:1, y:4 },
  { id:"t5", label:"T5", seats:4, x:4, y:4 },
];

const DAYS = ["Mo","Di","Mi","Do","Fr","Sa","So"];
const DAY_FULL = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
const SHIFTS = [
  { id:"F", label:"Frühschicht", time:"09:00–15:00", hours:6 },
  { id:"A", label:"Abendschicht", time:"17:00–24:00", hours:7 },
];
const ROLES = ["Service","Küche"];
const SEED_EMP = [
  { id:1, name:"Anna K.", role:"Service", maxHours:40, freeDays:["So"], avoidShift:null },
  { id:2, name:"Mehmet Y.", role:"Küche", maxHours:40, freeDays:[], avoidShift:null },
  { id:3, name:"Lena P.", role:"Service", maxHours:20, freeDays:["Mo","Di"], avoidShift:"A" },
  { id:4, name:"Jonas R.", role:"Küche", maxHours:30, freeDays:["Mi"], avoidShift:null },
  { id:5, name:"Sofia M.", role:"Service", maxHours:30, freeDays:[], avoidShift:"F" },
  { id:6, name:"David B.", role:"Service", maxHours:40, freeDays:["Sa"], avoidShift:null },
  { id:7, name:"Aylin D.", role:"Küche", maxHours:20, freeDays:["So"], avoidShift:"A" },
  { id:8, name:"Tom W.", role:"Küche", maxHours:40, freeDays:[], avoidShift:"F" },
];
const BASE_DEMAND = [
  { F:{Service:1,Küche:1}, A:{Service:2,Küche:1} },
  { F:{Service:1,Küche:1}, A:{Service:2,Küche:1} },
  { F:{Service:1,Küche:1}, A:{Service:2,Küche:1} },
  { F:{Service:2,Küche:1}, A:{Service:2,Küche:2} },
  { F:{Service:2,Küche:1}, A:{Service:3,Küche:2} },
  { F:{Service:2,Küche:2}, A:{Service:3,Küche:2} },
  { F:{Service:2,Küche:1}, A:{Service:2,Küche:1} },
];

/* ═══════════════ Login ═══════════════ */
function LoginScreen({ chef, accounts, onLogin }){
  const [form, setForm] = useState({ u:"", p:"", err:"" });
  function tryLogin(){
    const u = form.u.trim().toLowerCase();
    if (u === chef.u.toLowerCase() && form.p === chef.p){ onLogin({ ...DEFAULT_CHEF, u:chef.u }); return; }
    const acc = accounts.find(x => x.u.toLowerCase() === u && x.p === form.p);
    if (acc) onLogin(acc);
    else setForm(f => ({ ...f, err:"Benutzername oder Passwort falsch." }));
  }
  return (
    <div style={{padding:"56px 18px"}}>
      <div className="brand" style={{textAlign:"center", fontSize:34}}>GASTRO·BON</div>
      <p className="sub" style={{textAlign:"center", paddingBottom:18}}>Bitte anmelden, um fortzufahren</p>
      <section className="bon">
        <div className="bon-head"><span>ANMELDUNG</span><span></span></div>
        <div className="formgrid">
          <div className="full"><label className="lbl">Benutzername</label>
            <input value={form.u} autoCapitalize="none" autoComplete="username"
              onChange={e=>setForm({...form, u:e.target.value})} placeholder="Benutzername"
              onKeyDown={e=>{ if(e.key==="Enter") tryLogin(); }} /></div>
          <div className="full"><label className="lbl">Passwort</label>
            <input type="password" value={form.p} autoComplete="current-password"
              onChange={e=>setForm({...form, p:e.target.value})}
              onKeyDown={e=>{ if(e.key==="Enter") tryLogin(); }} placeholder="Passwort" /></div>
        </div>
        {form.err && <p className="meta red">{form.err}</p>}
        <button className="primary" style={{width:"100%", marginTop:6}} onClick={tryLogin}>Anmelden</button>
      </section>
    </div>
  );
}

/* ═══════════════ Zentrale: Restaurant-Übersicht ═══════════════ */
function Overview({ chef, restaurants, accounts, onPick, onAddRestaurant, onChangeChef, onLogout }){
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name:"", ort:"" });
  const [chefSheet, setChefSheet] = useState(null);
  const cards = restaurants.map(r => {
    const d = store.load("gastrobon-" + r.id);
    let revenue = 0, busy = 0, tablesN = SEED_TABLES.length;
    if (d){
      revenue = d.revenue || 0;
      tablesN = (d.tables || SEED_TABLES).length;
      Object.values(d.tstate || {}).forEach(st => { if (st.guests > 0) busy++; });
    }
    const accN = accounts.filter(a => a.restId === r.id).length;
    return { ...r, revenue, busy, tablesN, accN, hasData: !!d };
  });
  const issues = cards.filter(c => c.issue).length;
  return (
    <div>
      <header className="hd">
        <div>
          <div className="brand">GASTRO·BON ZENTRALE</div>
          <div className="sub">Angemeldet: <b>{chef.u}</b> · {restaurants.length} Restaurants</div>
        </div>

/* ═══════════════ Restaurant-App ═══════════════ */
function RestaurantApp({ user, rest, onBack, onLogout }){
  const KEY = "gastrobon-" + rest.id;
  const saved = useMemo(() => store.load(KEY), []);
  const isAdmin = user.role === "admin" || user.role === "chef";
  const isKitchen = user.role === "kitchen";
  const [view, setView] = useState(isKitchen ? "kueche" : "tische");
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 10000);
    return () => clearInterval(t);
  }, []);
  const [filter, setFilter] = useState("alle");
  const [payFor, setPayFor] = useState(null);

  const [tables, setTables] = useState(saved?.tables || SEED_TABLES);
  const [tstate, setTstate] = useState(saved?.tstate || {});
  const [editMode, setEditMode] = useState(false);
  const [moving, setMoving] = useState(null);
  const [tableSheet, setTableSheet] = useState(null);
  const [newTableAt, setNewTableAt] = useState(null);
  const [revenue, setRevenue] = useState(saved?.revenue || 0);
  const [bills, setBills] = useState(saved?.bills || 0);
  const [revCash, setRevCash] = useState(saved?.revCash || 0);
  const [revCard, setRevCard] = useState(saved?.revCard || 0);

  const [reservations, setReservations] = useState(saved?.reservations || [
    { id:"r1", name:"Familie Berger", persons:4, time:"19:00", tableId:"t3", note:"" },
  ]);
  const [resForm, setResForm] = useState({ name:"", persons:2, time:"19:00", note:"" });
  const [waitlist, setWaitlist] = useState(saved?.waitlist || []);
  const [walkin, setWalkin] = useState({ name:"", persons:2 });

  const [subtab, setSubtab] = useState("plan");
  const [day, setDay] = useState(4);
  const [employees, setEmployees] = useState(saved?.employees || SEED_EMP);
  const [empSheet, setEmpSheet] = useState(null);
  const [assignments, setAssignments] = useState(saved?.assignments || {});
  const [sunny, setSunny] = useState(saved?.sunny ?? true);
  const [events, setEvents] = useState(saved?.events || {5:true});
  const [shiftSheet, setShiftSheet] = useState(null);
  const [fixing, setFixing] = useState(false);
  const [issueFixed, setIssueFixed] = useState(false);
  const [kicked, setKicked] = useState(false);
  const loginAt = useMemo(() => Date.now(), []);

  useEffect(() => {
    const check = setInterval(() => {
      if (store.logoutStamp(rest.id) > loginAt) onLogout();
    }, 3000);
    return () => clearInterval(check);
  }, [rest.id, loginAt]);

  useEffect(() => {
    store.save(KEY, { tables, tstate, revenue, bills, revCash, revCard, reservations, waitlist, assignments, sunny, events, employees });
  }, [tables, tstate, revenue, bills, revCash, revCard, reservations, waitlist, assignments, sunny, events, employees]);

  /* ───── Tisch-Logik ───── */
  const reservedIds = useMemo(() => new Set(reservations.filter(r => r.tableId).map(r => r.tableId)), [reservations]);
  const statusOf = t => {
    const st = tstate[t.id];
    if (st && st.guests > 0) return "busy";
    if (reservedIds.has(t.id)) return "res";
    return "free";
  };
  const orderTotal = id => {
    const o = (tstate[id] && tstate[id].orders) || {};
    return Object.entries(o).reduce((s,[mid,q]) => s + (MENU.find(m=>m.id===mid)?.price || 0) * q, 0);
  };
  const seatStats = useMemo(() => {
    let total=0, free=0, busy=0, res=0, open=0;
    tables.forEach(t => {
      total += t.seats;
      const s = statusOf(t);
      if (s==="busy"){ busy += tstate[t.id].guests; free += Math.max(0, t.seats - tstate[t.id].guests); open += orderTotal(t.id); }
      else if (s==="res") res += t.seats;
      else free += t.seats;
    });
    return { total, free, busy, res, open };
  }, [tables, tstate, reservedIds]);

  function addTable(x, y, seats){
    const n = tables.length + 1;
    setTables([...tables, { id:"t"+Date.now(), label:"T"+n, seats, x, y }]);
    setNewTableAt(null);
  }
  function changeOrder(tid, mid, delta){
    setTstate(prev => {
      const st = prev[tid] || { guests:0, orders:{}, pending:{}, pendingAt:null };
      const q = Math.max(0, (st.orders[mid]||0) + delta);
      const orders = { ...st.orders };
      if (q === 0) delete orders[mid]; else orders[mid] = q;
      const pending = { ...(st.pending || {}) };
      if (delta > 0){
        pending[mid] = (pending[mid] || 0) + delta;
      } else if (pending[mid]){
        pending[mid] = Math.max(0, pending[mid] + delta);
        if (pending[mid] === 0) delete pending[mid];
      }
      const hasPending = Object.keys(pending).length > 0;
      const pendingAt = hasPending ? (st.pendingAt || Date.now()) : null;
      return { ...prev, [tid]: { ...st, orders, pending, pendingAt } };
    });
  }
  function kitchenDone(tid){
    setTstate(prev => {
      const st = prev[tid];
      if (!st) return prev;
      return { ...prev, [tid]: { ...st, pending:{}, pendingAt:null } };
    });
  }
  function setGuests(tid, delta, seats){
    setTstate(prev => {
      const st = prev[tid] || { guests:0, orders:{} };
      const g = Math.min(seats, Math.max(0, st.guests + delta));
      let seatedAt = st.seatedAt || null;
      if (g > 0 && !seatedAt) seatedAt = Date.now();
      if (g === 0) seatedAt = null;
      return { ...prev, [tid]: { ...st, guests: g, seatedAt } };
    });
  }
  function checkout(tid, method){
    const sum = orderTotal(tid);
    setRevenue(r => r + sum);
    setBills(b => b + 1);
    if (method === "karte") setRevCard(c => c + sum); else setRevCash(c => c + sum);
    setTstate(prev => { const p = { ...prev }; delete p[tid]; return p; });
    setPayFor(null);
    setTableSheet(null);
  }
  const [zConfirm, setZConfirm] = useState(false);
  const [zDone, setZDone] = useState(false);
  function dayClose(){
    if (!zConfirm){ setZConfirm(true); setTimeout(()=>setZConfirm(false), 5000); return; }
    setRevenue(0); setBills(0); setRevCash(0); setRevCard(0);
    setZConfirm(false); setZDone(true);
    setTimeout(()=>setZDone(false), 3000);
  }

  /* ───── Reservierungs-Logik ───── */
  function addReservation(){
    if (!resForm.name.trim()) return;
    setReservations([...reservations, { id:"r"+Date.now(), ...resForm, persons:+resForm.persons, tableId:null }]);
    setResForm({ name:"", persons:2, time:"19:00", note:"" });
  }
  function checkIn(r){
    if (!r.tableId) return;
    const t = tables.find(t => t.id === r.tableId);
    setTstate(prev => ({ ...prev, [r.tableId]: { guests: Math.min(t.seats, r.persons), orders: (prev[r.tableId]?.orders)||{}, seatedAt: Date.now() } }));
    setReservations(rs => rs.filter(x => x.id !== r.id));
    setView("tische");
  }
  const fittingTables = persons => tables.filter(t => statusOf(t)==="free" && t.seats >= persons);

  /* ───── Wartezeit-Prognose (Alleinstellungsmerkmal) ───── */
  function estimateWaitMin(persons){
    const fits = tables.filter(t => t.seats >= persons);
    if (fits.length === 0) return null; // kein Tisch dieser Größe vorhanden
    let best = Infinity;
    fits.forEach(t => {
      const s = statusOf(t);
      if (s === "free") best = 0;
      else if (s === "busy"){
        const seatedAt = tstate[t.id]?.seatedAt;
        const remain = seatedAt ? Math.max(0, AVG_DINING_MIN - (now - seatedAt)/60000) : AVG_DINING_MIN/2;
        best = Math.min(best, Math.round(remain));
      } else { // reserviert: konservativ
        best = Math.min(best, AVG_DINING_MIN);
      }
    });
    return best === Infinity ? AVG_DINING_MIN : best;
  }
  function addWalkin(){
    if (!walkin.name.trim()) return;
    const est = estimateWaitMin(+walkin.persons);
    setWaitlist([...waitlist, { id:"w"+Date.now(), name:walkin.name.trim(), persons:+walkin.persons, addedAt:Date.now(), readyAt: est!=null ? Date.now()+est*60000 : null }]);
    setWalkin({ name:"", persons:2 });
  }
  function seatWalkin(w){
    const t = fittingTables(w.persons)[0];
    if (!t) return;
    setTstate(prev => ({ ...prev, [t.id]: { guests: w.persons, orders:{}, seatedAt: Date.now() } }));
    setWaitlist(list => list.filter(x => x.id !== w.id));
    setView("tische");
  }

  /* ───── Schicht-Logik ───── */
  const demand = useMemo(() => {
    const out = {};
    for (let d=0; d<7; d++) for (const s of SHIFTS){
      const b = BASE_DEMAND[d][s.id];
      let sv = b.Service, ku = b.Küche;
      if (sunny && s.id==="F") sv += 1;
      if (events[d] && s.id==="A"){ sv += 1; ku += 1; }
      out[keyOf(d,s.id)] = { Service:sv, Küche:ku };
    }
    return out;
  }, [sunny, events]);

  const hoursOf = useMemo(() => {
    const h = {}; employees.forEach(e => h[e.id]=0);
    Object.entries(assignments).forEach(([k,ids]) => {
      const sh = SHIFTS.find(s => s.id === k.split("-")[1]);
      ids.forEach(id => { if (h[id] !== undefined) h[id] += sh.hours; });
    });
    return h;
  }, [assignments, employees]);

  const checks = useMemo(() => {
    const v = []; let ok=0, tot=0;
    employees.forEach(e => {
      if (hoursOf[e.id] > e.maxHours) v.push({level:"hard", text:e.name+": "+hoursOf[e.id]+" h geplant, Vertrag erlaubt "+e.maxHours+" h/Woche."});
      for (let d=0; d<6; d++){
        if ((assignments[keyOf(d,"A")]||[]).includes(e.id) && (assignments[keyOf(d+1,"F")]||[]).includes(e.id))
          v.push({level:"hard", text:e.name+": nur 9 h Ruhezeit "+DAYS[d]+"-Abend → "+DAYS[d+1]+"-Früh (§5 ArbZG: min. 11 h)."});
      }
      const wd = DAYS.filter((_,d) => SHIFTS.some(s => (assignments[keyOf(d,s.id)]||[]).includes(e.id))).length;
      if (wd >= 7) v.push({level:"hard", text:e.name+": 7 Arbeitstage ohne freien Tag."});
      for (let d=0; d<7; d++) for (const s of SHIFTS){
        if ((assignments[keyOf(d,s.id)]||[]).includes(e.id)){
          tot++;
          const fw = e.freeDays.includes(DAYS[d]), sw = e.avoidShift === s.id;
          if (!fw && !sw) ok++;
          else v.push({level:"soft", text:e.name+": "+DAYS[d]+" "+s.label+" widerspricht "+(fw?"Wunsch-Frei":"Schichtwunsch")+"."});
        }
      }
    });
    for (let d=0; d<7; d++) for (const s of SHIFTS) for (const r of ROLES){
      const have = (assignments[keyOf(d,s.id)]||[]).filter(id => employees.find(e=>e.id===id)?.role===r).length;
      const need = demand[keyOf(d,s.id)][r];
      if (have < need) v.push({level:"gap", text:DAYS[d]+" "+s.label+": "+r+" unterbesetzt ("+have+"/"+need+")."});
    }
    return { v, quote: tot ? Math.round(ok/tot*100) : 100 };
  }, [assignments, hoursOf, demand, employees]);

  function autoPlan(){
    const plan = {}, hrs = {}, wdays = {};
    employees.forEach(e => { hrs[e.id]=0; wdays[e.id]=new Set(); });
    for (let d=0; d<7; d++) for (const s of SHIFTS){
      const k = keyOf(d,s.id); plan[k]=[];
      for (const r of ROLES){
        const need = demand[k][r];
        const pool = employees
          .filter(e => e.role===r && !plan[k].includes(e.id))
          .filter(e => hrs[e.id] + s.hours <= e.maxHours)
          .filter(e => !(s.id==="F" && d>0 && (plan[keyOf(d-1,"A")]||[]).includes(e.id)))
          .map(e => {
            let p = 0;
            if (e.freeDays.includes(DAYS[d])) p += 10;
            if (e.avoidShift === s.id) p += 6;
            if (wdays[e.id].size >= 5 && !wdays[e.id].has(d)) p += 8;
            return { e, p };
          })
          .sort((a,b) => a.p - b.p || hrs[a.e.id] - hrs[b.e.id]);
        for (let i=0; i<need && i<pool.length; i++){
          const id = pool[i].e.id;
          plan[k].push(id); hrs[id] += s.hours; wdays[id].add(d);
        }
      }
    }
    setAssignments(plan);
  }
  function toggleAssign(d, sid, eid){
    const k = keyOf(d, sid);
    setAssignments(prev => {
      const ids = prev[k] || [];
      return { ...prev, [k]: ids.includes(eid) ? ids.filter(i=>i!==eid) : [...ids, eid] };
    });
  }
  function saveEmployee(){
    const e = empSheet;
    if (!e || !e.name.trim()) return;
    const clean = { ...e, name:e.name.trim(), maxHours: Math.max(1, +e.maxHours || 20) };
    if (e.id){
      setEmployees(list => list.map(x => x.id === e.id ? clean : x));
    } else {
      const id = Math.max(0, ...employees.map(x => x.id)) + 1;
      setEmployees(list => [...list, { ...clean, id }]);
    }
    setEmpSheet(null);
  }
  function deleteEmployee(id){
    setEmployees(list => list.filter(x => x.id !== id));
    setAssignments(prev => {
      const next = {};
      Object.entries(prev).forEach(([k, ids]) => { next[k] = ids.filter(i => i !== id); });

    });

  const grid = [];

      {view==="schichten" && isAdmin && (

            {[["plan","Plan"],["team","Team"],["prognose","Prognose"]].map(([id,l]) =>

            <div className="stats" style={{padding:"4px 0 10px"}}>
              <div><b className="mono">{tickets.length}</b><span>offene Bons</span></div>
              <div><b className={"mono " + (crit ? "red" : "green")}>{crit}</b><span>überfällig (rot)</span></div>
              <div><b className="mono">{WARN_MIN}/{CRIT_MIN}</b><span>Min bis orange/rot</span></div>
            </div>
            {tickets.length === 0 && (
              <section className="bon">
                <p className="meta" style={{padding:"14px 0"}}>Alles abgearbeitet — keine offenen Bestellungen. 👨‍🍳</p>
              </section>
            )}
            <div className="kdsgrid">
              {tickets.map(t => {
                const st = tstate[t.id];
                const mins = Math.floor((now - st.pendingAt) / 60000);
                const cls = mins >= CRIT_MIN ? "kds-crit" : mins >= WARN_MIN ? "kds-warn" : "kds-ok";
                return (
                  <section key={t.id} className={"kds " + cls}>
                    <div className="bon-head">
                      <span>TISCH {t.label}</span>
                      <span className="kds-age">{mins < 1 ? "neu" : "seit " + mins + " min"}</span>
                    </div>
                    {mins >= CRIT_MIN && <p className="meta red" style={{paddingTop:8}}>⚠ ÜBERFÄLLIG — Gäste warten!</p>}
                    <div style={{padding:"6px 0"}}>
                      {Object.entries(st.pending).map(([mid,q]) => {
                        const m = MENU.find(x=>x.id===mid);
                        return (
                          <div className="kds-item" key={mid}>
                            <span>{m ? m.name : "?"}</span><b>×{q}</b>
                          </div>
                        );
                      })}
                    </div>
                    <button className="primary green" style={{width:"100%"}} onClick={()=>kitchenDone(t.id)}>
                      ✓ Fertig — raus damit
                    </button>
                  </section>
                );
              })}
            </div>
          </main>
        );
      })()}

      {/* ───────── Sheet: Tisch / Bestellung / Rechnung ───────── */}
      {tableSheet && (() => {
        const t = tables.find(x=>x.id===tableSheet);
        if (!t) return null;
        const st = tstate[t.id] || { guests:0, orders:{} };
        const res = reservations.find(r => r.tableId === t.id);
        const sum = orderTotal(t.id);
        const cats = [...new Set(MENU.map(m=>m.cat))];
        return (
          <div className="sheetwrap" onClick={()=>setTableSheet(null)}>
            <div className="sheet" onClick={e=>e.stopPropagation()}>
              <div className="bon-head">
                <span>{t.label} · {t.seats} PLÄTZE</span>
                <button className="close" onClick={()=>setTableSheet(null)} aria-label="Schließen">✕</button>
              </div>
              {res && st.guests===0 && <p className="meta blue">Reserviert: {res.time} · {res.name} · {res.persons} Pers.</p>}

              <p className="meta strong">Gäste am Tisch</p>
              <div className="stepper">
                <button className="qty" onClick={()=>setGuests(t.id,-1,t.seats)} style={{width:34,height:34,border:"1px solid var(--line)",borderRadius:8,background:"var(--steel)",cursor:"pointer",fontSize:18}}>−</button>
                <b>{st.guests}</b>
                <button className="qty" onClick={()=>setGuests(t.id,1,t.seats)} style={{width:34,height:34,border:"1px solid var(--line)",borderRadius:8,background:"var(--steel)",cursor:"pointer",fontSize:18}}>+</button>
                <span className="meta">von {t.seats} Plätzen ({t.seats - st.guests} frei)</span>
              </div>

              <p className="meta strong">Bestellung aufnehmen</p>
              {cats.map(c => (
                <div key={c}>
                  <p className="meta">{c}</p>
                  <div className="menugrid">
                    {MENU.filter(m=>m.cat===c).map(m => (
                      <button key={m.id} className="mitem" onClick={()=>changeOrder(t.id, m.id, 1)}>
                        <b>{m.name}</b><span>{eur(m.price)}</span>
                        {st.orders[m.id] ? <span className="green"> ×{st.orders[m.id]}</span> : null}
                      </button>
                    ))}
                  </div>
                </div>
              ))}

              {Object.keys(st.orders).length > 0 && (
                <React.Fragment>
                  <p className="meta strong">Rechnung {t.label}</p>
                  {Object.entries(st.orders).map(([mid,q]) => {
                    const m = MENU.find(x=>x.id===mid);
                    return (
                      <div className="row" key={mid}>
                        <span>{q}× {m.name}</span>
                        <span className="qty">
                          <button onClick={()=>changeOrder(t.id, mid, -1)}>−</button>
                          <button onClick={()=>changeOrder(t.id, mid, 1)}>+</button>
                          <span className="mono" style={{minWidth:70, textAlign:"right"}}>{eur(m.price*q)}</span>
                        </span>
                      </div>
                    );
                  })}
                  <div className="total"><span>SUMME (inkl. MwSt.)</span><span>{eur(sum)}</span></div>
                  <button className="primary green" style={{width:"100%", marginTop:12}} onClick={()=>setPayFor(t.id)}>
                    Zur Kasse — {eur(sum)}
                  </button>
                </React.Fragment>
              )}

              {editMode && (
                <button className="ghost" style={{borderColor:"var(--paprika)", color:"var(--paprika)"}}
                  onClick={()=>{ setTables(ts=>ts.filter(x=>x.id!==t.id)); setTableSheet(null); }}>
                  Tisch entfernen
                </button>
              )}
            </div>
          </div>
        );
      })()}

      {/* ───────── Sheet: Kasse / Zahlung ───────── */}
      {payFor && (() => {
        const t = tables.find(x => x.id === payFor);
        if (!t) return null;
        const sum = orderTotal(payFor);
        const sumupLink = "sumupmerchant://pay/1.0?total=" + sum.toFixed(2) +
          "&currency=EUR&title=" + encodeURIComponent("Tisch " + t.label);
        return (
          <div className="sheetwrap" onClick={()=>setPayFor(null)}>
            <div className="sheet" onClick={e=>e.stopPropagation()}>
              <div className="bon-head"><span>KASSE · TISCH {t.label}</span>
                <button className="close" onClick={()=>setPayFor(null)} aria-label="Schließen">✕</button></div>
              <div className="total" style={{borderTop:"none", fontSize:22, padding:"14px 0 6px"}}>
                <span>ZU ZAHLEN</span><span>{eur(sum)}</span>
              </div>
              <p className="meta strong">Zahlungsart wählen</p>
              <button className="primary green" style={{width:"100%", marginTop:8}}
                onClick={()=>checkout(payFor, "bar")}>
                💶 Bar kassiert — Tisch freigeben
              </button>
              <a href={sumupLink} style={{display:"block", textDecoration:"none", marginTop:8}}>
                <span className="primary" style={{display:"block", textAlign:"center", background:"var(--blue)"}}>
                  💳 Kartenleser öffnen (SumUp-App, Betrag wird übergeben)
                </span>
              </a>
              <button className="primary" style={{width:"100%", marginTop:8, background:"var(--ink)"}}
                onClick={()=>checkout(payFor, "karte")}>
                ✓ Kartenzahlung am Terminal bestätigt — Tisch freigeben
              </button>
              <p className="meta">So funktioniert's: „Kartenleser öffnen" startet die SumUp-App auf diesem Gerät und übergibt automatisch den Betrag. Nach erfolgreicher Zahlung am Lesegerät hier „bestätigt" antippen. Für andere Anbieter (Zettle, Nexi …) oder vollautomatische Buchung wird ein Händlerkonto mit API-Schlüssel benötigt.</p>
            </div>
          </div>
        );
      })()}

      {/* ───────── Sheet: neuer Tisch ───────── */}
      {newTableAt && (
        <div className="sheetwrap" onClick={()=>setNewTableAt(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="bon-head"><span>NEUER TISCH</span>
              <button className="close" onClick={()=>setNewTableAt(null)} aria-label="Schließen">✕</button></div>
            <p className="meta strong">Wie viele Sitzplätze?</p>
            <div className="menugrid">
              {[2,4,6,8,10,12].map(n =>
                <button key={n} className="mitem" onClick={()=>addTable(newTableAt.x, newTableAt.y, n)}>
                  <b>{n} Plätze</b>
                </button>)}
            </div>
          </div>
        </div>
      )}

      {/* ───────── Sheet: Mitarbeiter:in anlegen / bearbeiten ───────── */}
      {empSheet && (
        <div className="sheetwrap" onClick={()=>setEmpSheet(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="bon-head">
              <span>{empSheet.id ? "MITARBEITER:IN BEARBEITEN" : "NEUE MITARBEITER:IN"}</span>
              <button className="close" onClick={()=>setEmpSheet(null)} aria-label="Schließen">✕</button>
            </div>
            <div className="formgrid">
              <div className="full"><label className="lbl">Name</label>
                <input value={empSheet.name} onChange={e=>setEmpSheet({...empSheet, name:e.target.value})} placeholder="z. B. Maria S." /></div>
              <div><label className="lbl">Bereich</label>
                <select value={empSheet.role} onChange={e=>setEmpSheet({...empSheet, role:e.target.value})}>
                  {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                </select></div>
              <div><label className="lbl">Max. Std/Woche (Vertrag)</label>
                <input type="number" min="1" max="48" value={empSheet.maxHours}
                  onChange={e=>setEmpSheet({...empSheet, maxHours:e.target.value})} /></div>
              <div className="full"><label className="lbl">Schicht-Wunsch</label>
                <select value={empSheet.avoidShift || ""} onChange={e=>setEmpSheet({...empSheet, avoidShift:e.target.value || null})}>
                  <option value="">Keine Einschränkung</option>
                  <option value="F">Meidet Frühschicht</option>
                  <option value="A">Meidet Abendschicht</option>
                </select></div>
            </div>
            <p className="meta strong">Wunsch-freie Tage</p>
            <div style={{display:"flex", gap:6, padding:"6px 0 14px"}}>
              {DAYS.map(dn => (
                <button key={dn} className={"daychip "+(empSheet.freeDays.includes(dn)?"on":"")}
                  onClick={()=>setEmpSheet(p => ({...p, freeDays: p.freeDays.includes(dn) ? p.freeDays.filter(x=>x!==dn) : [...p.freeDays, dn]}))}>
                  <span>{dn}</span>
                </button>
              ))}
            </div>
            <button className="primary green" style={{width:"100%"}} onClick={saveEmployee} disabled={!empSheet.name.trim()}>
              {empSheet.id ? "Änderungen speichern" : "Mitarbeiter:in anlegen"}
            </button>
            {empSheet.id && (
              <button className="ghost" style={{borderColor:"var(--paprika)", color:"var(--paprika)"}}
                onClick={()=>deleteEmployee(empSheet.id)}>
                Mitarbeiter:in löschen (entfernt auch alle Schichten)
              </button>
            )}
          </div>
        </div>
      )}

      {/* ───────── Sheet: Schicht besetzen ───────── */}
      {shiftSheet && (
        <div className="sheetwrap" onClick={()=>setShiftSheet(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="bon-head">
              <span>{DAY_FULL[day].toUpperCase()} · {shiftSheet.label.toUpperCase()}</span>
              <button className="close" onClick={()=>setShiftSheet(null)} aria-label="Schließen">✕</button>
            </div>
            {ROLES.map(r => (
              <div key={r}>
                <p className="meta strong">{r}</p>
                {employees.filter(e=>e.role===r).map(e => {
                  const k = keyOf(day, shiftSheet.id);
                  const on = (assignments[k]||[]).includes(e.id);
                  const flags = [];
                  if (e.freeDays.includes(DAYS[day])) flags.push("Wunsch-frei");
                  if (e.avoidShift===shiftSheet.id) flags.push("meidet Schicht");
                  if (hoursOf[e.id] + (on?0:shiftSheet.hours) > e.maxHours) flags.push("über Max-Std");
                  if (shiftSheet.id==="F" && day>0 && (assignments[keyOf(day-1,"A")]||[]).includes(e.id)) flags.push("Ruhezeit!");
                  return (
                    <button key={e.id} className={"pickrow "+(on?"picked":"")} onClick={()=>toggleAssign(day, shiftSheet.id, e.id)}>
                      <span>{on?"✓ ":""}{e.name}</span>
                      <span className={"flags "+((flags.includes("Ruhezeit!")||flags.includes("über Max-Std"))?"red":"")}>
                        {flags.length?flags.join(" · "):hoursOf[e.id]+" h geplant"}
                      </span>
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      )}

      </div>

      <nav className="tabs">
        {(isKitchen
          ? [["kueche","Küche","🍳"]]
          : user.role === "service"
            ? [["tische","Tische","🍽"],["reservierung","Gäste","⏱"],["kueche","Küche","🍳"]]
            : [["tische","Tische","🍽"],["reservierung","Gäste","⏱"],["kueche","Küche","🍳"],["schichten","Schichten","📅"]]
        ).map(([id,l,ico]) =>
          <button key={id} className={view===id?"on":""} onClick={()=>setView(id)}>
            <span className="tabico">{ico}</span><span>{l}</span>
          </button>)}
      </nav>
    </div>
  );
}

/* ═══════════════ Wurzel: Login → Zentrale → Hub → Betrieb ═══════════════ */
function App(){
  const [user, setUser] = useState(null);
  const [restId, setRestId] = useState(null);
  const [operating, setOperating] = useState(false);
  const [config, setConfig] = useState(loadConfig);

  useEffect(() => { store.save("gastrobon-config", config); }, [config]);

  function logout(){ setUser(null); setRestId(null); setOperating(false); }

  function addRestaurant(name, ort){
    const id = "r" + Date.now();
    setConfig(c => ({ ...c, restaurants:[...c.restaurants, { id, name, ort, issue:null }] }));
  }
  function updateRest(id, patch){
    setConfig(c => ({ ...c, restaurants: c.restaurants.map(r => r.id===id ? { ...r, ...patch } : r) }));
  }
  function deleteRest(id){
    setConfig(c => ({ restaurants: c.restaurants.filter(r => r.id!==id), accounts: c.accounts.filter(a => a.restId!==id) }));
    setRestId(null);
  }
  function addAccount(acc){
    setConfig(c => ({ ...c, accounts:[...c.accounts, { ...acc, id:"a"+Date.now() }] }));
  }
  function updateAccount(acc){
    setConfig(c => ({ ...c, accounts: c.accounts.map(a => a.id===acc.id ? acc : a) }));
  }
  function deleteAccount(id){
    setConfig(c => ({ ...c, accounts: c.accounts.filter(a => a.id!==id) }));
  }
  function changeChef(creds){
    setConfig(c => ({ ...c, chef: creds }));
    setUser(u => u ? { ...u, u:creds.u } : u);
  }

  if (!user) return <LoginScreen chef={config.chef} accounts={config.accounts} onLogin={u => {
    setUser(u); setOperating(false);
    setRestId(u.role === "chef" ? null : u.restId);
  }} />;

  // Chef: Übersicht, dann Hub
  if (user.role === "chef" && !restId)
    return <Overview chef={config.chef} restaurants={config.restaurants} accounts={config.accounts}
      onPick={setRestId} onAddRestaurant={addRestaurant} onChangeChef={changeChef} onLogout={logout} />;

  const rest = config.restaurants.find(r => r.id === restId) || config.restaurants[0];
  if (!rest) return <Overview chef={config.chef} restaurants={config.restaurants} accounts={config.accounts}
      onPick={setRestId} onAddRestaurant={addRestaurant} onChangeChef={changeChef} onLogout={logout} />;

  if (user.role === "chef" && !operating)
    return <RestaurantHub rest={rest} accounts={config.accounts}
      onOpen={()=>setOperating(true)}
      onBack={()=>setRestId(null)} onLogout={logout}
      onAddAccount={addAccount} onUpdateAccount={updateAccount} onDeleteAccount={deleteAccount}
      onUpdateRest={updateRest} onDeleteRest={deleteRest} onForceLogout={store.forceLogout} />;

  return (
    <RestaurantApp key={rest.id} user={user} rest={rest}
      onBack={user.role === "chef" ? ()=>setOperating(false) : null}
      onLogout={logout} />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
